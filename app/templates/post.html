{% extends "layout.html" %}

{% block content %}
<section class="content container">
  <article class="page-content">
    <time class="eyebrow" datetime="{{ post.published_at.isoformat() }}">{{ post.published_at.strftime('%d %b %Y') }}</time>
    <h1>{{ post.title }}</h1>
    {% if post.excerpt %}<p class="lede">{{ post.excerpt }}</p>{% endif %}
    <div class="markdown-body">{{ post_html | safe }}</div>
  </article>
</section>
{% endblock %}
