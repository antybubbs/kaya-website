{% extends "layout.html" %}

{% block content %}
<section class="admin-screen container">
  <div class="admin-panel">
    {% include "admin_nav.html" %}
    <header class="admin-panel-header">
      <div><span class="eyebrow">Media</span><h1>Uploads</h1></div>
      <form method="post" action="/admin/uploads" enctype="multipart/form-data" class="upload-form">
        <input type="file" name="image" accept="image/*" required />
        <button class="button button-primary" type="submit">Upload</button>
      </form>
    </header>
    <div class="upload-grid">
      {% for upload in uploads %}
      <article class="upload-card">
        <img src="/uploads/{{ upload.filename }}" alt="{{ upload.original_filename }}" />
        <strong>{{ upload.original_filename }}</strong>
        <code>/uploads/{{ upload.filename }}</code>
      </article>
      {% else %}
      <p>No images uploaded yet.</p>
      {% endfor %}
    </div>
  </div>
</section>
{% endblock %}
