<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 260" role="img" aria-labelledby="title desc">
  <title id="title">Kaya</title>
  <desc id="desc">Kaya logo with infrastructure house mark, KAYA wordmark and tagline Your Infrastructure. Your Home.</desc>
  <defs>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffa733"/>
      <stop offset="0.48" stop-color="#ff8a00"/>
      <stop offset="1" stop-color="#e95f00"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e7e2d8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>
  <rect width="980" height="260" fill="none"/>
  <g filter="url(#shadow)">
    <image href="/static/brand/kaya-icon.svg" x="0" y="20" width="210" height="210" preserveAspectRatio="xMidYMid meet"/>
  </g>
  <g font-family="Inter, Manrope, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif">
    <text x="250" y="119" fill="url(#word)" font-size="86" font-weight="850" letter-spacing="23">KAYA</text>
    <circle cx="468" cy="119" r="9" fill="#ff7a00"/>
    <circle cx="747" cy="119" r="9" fill="#ff7a00"/>
    <line x1="250" y1="164" x2="420" y2="164" stroke="url(#orange)" stroke-width="5"/>
    <line x1="576" y1="164" x2="790" y2="164" stroke="url(#orange)" stroke-width="5"/>
    <g transform="translate(468 164)" stroke="#ff7a00" stroke-width="5" stroke-linecap="round" fill="none">
      <path d="M0 -18 L28 10 L56 -18"/>
      <path d="M0 18 L28 -10 L56 18"/>
      <path d="M78 -18 L50 10 L22 -18"/>
      <path d="M78 18 L50 -10 L22 18"/>
      <circle cx="-18" cy="0" r="2.5" fill="#ff7a00" stroke="none"/>
      <circle cx="96" cy="0" r="2.5" fill="#ff7a00" stroke="none"/>
    </g>
    <text x="250" y="214" fill="#aeb7c6" font-size="22" font-weight="800" letter-spacing="5.2">YOUR INFRASTRUCTURE. YOUR HOME.</text>
  </g>
</svg>
